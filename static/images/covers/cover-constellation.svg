      <stop offset="0%" stop-color="#06070f"/>
      <stop offset="58%" stop-color="#31355f"/>
      <stop offset="100%" stop-color="#a276b7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g fill="rgba(255,255,255,0.85)">
