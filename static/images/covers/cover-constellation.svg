<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Constellation Cover</title>
  <desc id="desc">A violet slate cover with stars and geometry lines.</desc>
